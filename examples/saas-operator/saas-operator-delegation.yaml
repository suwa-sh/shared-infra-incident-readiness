# Worked example: a marketing-automation operator entrusted with SaaS integrations.
#
# 複数顧客から SNS スケジューラ / ブログ / タスク管理 SaaS の連携運用を委託される
# 運用者(委託先)を題材に、共有インフラ責任モデルの三層へ写像する:
#   委託元ISP(principal_isp)  = 顧客 (運用者にマーケ自動化を委託する事業者)
#   OEM基盤運用者(oem_operator) = 運用者 (連携基盤・自動化ジョブの運用主体 = 委託先)
#   運用受託BPO(ops_bpo)       = 運用者の下請け / 自動化ジョブ運用
#   SaaSベンダー(sw_vendor)    = 各 SaaS (SNS スケジューラ / ブログ / タスク管理 等)
#
# 「自分(運用者=委託先)が何を SLA 化・通知すべきか」を 1 度埋めて明文化する。
# 全 12 項目を埋めた "良い記入例"。check-responsibility が PASS することを示す。
target: マーケ自動化運用者 (顧客 / 運用者 / SaaS の三層)
matrix:
  RB01: { principal_isp: R, oem_operator: C, ops_bpo: I, sw_vendor: I }
  RB02: { principal_isp: A, oem_operator: R, ops_bpo: I, sw_vendor: I }
  RB03: { principal_isp: A, oem_operator: R, ops_bpo: I, sw_vendor: I }
  RB04: { principal_isp: C, oem_operator: A, ops_bpo: I, sw_vendor: I }
  RB05: { principal_isp: C, oem_operator: R, ops_bpo: C, sw_vendor: C }
  RB06: { principal_isp: C, oem_operator: A, ops_bpo: C, sw_vendor: R }
  RB07: { principal_isp: I, oem_operator: R, ops_bpo: C, sw_vendor: A }
  RB08: { principal_isp: C, oem_operator: R, ops_bpo: C, sw_vendor: C }
  RB09: { principal_isp: C, oem_operator: R, ops_bpo: C, sw_vendor: C }
  RB10: { principal_isp: R, oem_operator: C, ops_bpo: C, sw_vendor: C }
  RB11: { principal_isp: A, oem_operator: R, ops_bpo: C, sw_vendor: I }
  RB12: { principal_isp: C, oem_operator: A, ops_bpo: C, sw_vendor: I }
