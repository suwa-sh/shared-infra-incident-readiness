# Builds a multi-arch (amd64 + arm64) container image and pushes it to GHCR on a
# version tag, then creates a GitHub Release. The overlay engine version is
# parsed from the exact pin in pyproject and recorded as an OCI label.
# SHA pinned actions per the OSS hardening checklist.
name: release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      packages: write # push the image to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Build and push multi-arch image to GHCR
        env:
          REGISTRY: ghcr.io
          IMAGE_NAME: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          ENGINE_VER=$(sed -n 's/.*overlay-scoring-skeleton==\([0-9][0-9.]*\).*/\1/p' pyproject.toml)
          echo "engine version: ${ENGINE_VER:-unknown}"
          IMAGE=$(printf '%s/%s' "$REGISTRY" "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          APP_VERSION="${TAG#v}"
          echo "$GH_TOKEN" | docker login "$REGISTRY" -u "$ACTOR" --password-stdin
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "OVERLAY_ENGINE_VERSION=${ENGINE_VER:-unknown}" \
            --build-arg "APP_VERSION=${APP_VERSION}" \
            -t "$IMAGE:$TAG" -t "$IMAGE:latest" \
            --push .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes
