# SHA pinned actions per the OSS hardening checklist.
# Workflow-wide permissions default to read-only; jobs only escalate when needed.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pytest>=8.0,<9.0"

      - name: Run pytest
        run: pytest tests/ -v

      - name: Smoke test the CLI
        run: |
          bin/siir --help
          bin/siir check-responsibility examples/responsibility/sample-oem-mail.yaml || [ $? -eq 2 ]
          bin/siir validate-record examples/records/sample-incident.json --level extended || [ $? -eq 2 ]
          bin/siir render-runbook examples/responsibility/sample-oem-mail.yaml --scenario rce-6brand
          bin/siir tabletop --scenario rce-6brand examples/responsibility/sample-oem-mail.yaml
          bin/siir check-overlay examples/overlays/sample-company/extra-clauses.yaml

  docs-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Lint Mermaid diagrams
        run: npx --yes md-mermaid-lint docs/*.md
